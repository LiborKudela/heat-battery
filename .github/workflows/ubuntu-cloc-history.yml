name: Upload SVG to Gist

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install cloc and python dependencies
        run: |
          sudo apt-get install cloc
          pip3 install plotly
          pip3 install -U kaleido
          pip3 install pandas

      - name: Pull clocl cache file
        run: |
          GIST_URL="https://gist.githubusercontent.com/LiborKudela/6f402d08683e16acdfc545b806f60259/raw/cloc_history_cache.csv" || echo "failed to load cache file from gists: cloc_history_cache.csv"
          curl -o cloc_history_cache.csv $GIST_URL

      - name: Update cloc history data
        run: |
          echo "Initial state of cache file:"
          cat cloc_history_cache.csv
          echo "Number of lines in cache file: $(wc -l cloc_history_cache.csv)"
          bash utilities/update_cloc_data.sh cloc_history_cache.csv
          echo "Updated state of cache file:"
          cat cloc_history_cache.csv
          echo "Number of lines in cache file: $(wc -l cloc_history_cache.csv)"
      - name: Upload new cloc history data cache to gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_SECRET }}
          FILE_PATH: cloc_history_cache.csv
          GIST_ID: "6f402d08683e16acdfc545b806f60259"
        run: |
          CONTENT=$(jq -Rs '.' < "$FILE_PATH")
          echo "{\"files\": {\"$(basename $FILE_PATH)\": {\"content\": $CONTENT}}}" > payload.json
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @payload.json
          rm payload.json

      - name: Create SVG chart files
        run: |
          python3 "utilities/create_cloc_chart.py" cloc_history_cache.csv
          

      - name: Upload new SVG to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_SECRET }}
          FILE_PATH: cloc_history_cache.svg
          GIST_ID: "6f402d08683e16acdfc545b806f60259"
        run: |
          CONTENT=$(jq -Rs '.' < "$FILE_PATH")
          echo "{\"files\": {\"$(basename $FILE_PATH)\": {\"content\": $CONTENT}}}" > payload.json
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @payload.json
          rm payload.json
