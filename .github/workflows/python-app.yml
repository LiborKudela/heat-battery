# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: setup.py
    
    - name: Install and test OpenMPI
      run: | 
        sudo apt-get update
        sudo apt install build-essential
        sudo apt-get install openmpi-bin openmpi-doc libopenmpi-dev
        pip install mpi4py
        mpirun -n 1 python3 -c "from mpi4py import MPI; print(f'rank: {MPI.COMM_WORLD.rank}')"

    - name: Install and test FeniCSx
      run: | 
        sudo sudo add-apt-repository ppa:fenics-packages/fenics
        sudo apt-get update
        sudo sudo apt install fenicsx
        python3 -c "import dolfinx"

    - run: pip3 install -e .

    - name: Test with unittest
      run: |
        python3 -m unittest discover -v -s ./test  -p 'test_*.py'
